{{ define "main" }}
<div class="home">
  <div class="home-content">
    {{ $icon := (resources.Get "images/icon.png").Resize "192x192 webp" }}
    <img src="{{ $icon.RelPermalink }}" width="96" height="96" alt="Jietnašiella" class="app-icon">
    <h1>{{ .Title }}</h1>
    <p class="tagline">{{ .Content }}</p>
    <p class="support">
      {{ i18n "support_intro" }}
      <a href="mailto:feedback@divvun.no">feedback@divvun.no</a>
    </p>
    <div class="store-badges">
      {{/* TODO: replace span with <a href="APP_STORE_URL" target="_blank" rel="noopener"> when live */}}
      <span><img src="{{ "images/badge-appstore.svg" | relURL }}" alt="Download on the App Store"></span>
      <a href="https://play.google.com/store/apps/details?id=no.uit.divvun.donate_your_speech" target="_blank" rel="noopener">
        <img src="{{ "images/badge-googleplay.svg" | relURL }}" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</div>
{{ end }}
