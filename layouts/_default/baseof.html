<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — Jietnašiella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ relLangURL "/" }}" class="nav-home">Jietnašiella</a>
      <div class="nav-links">
        {{ with .Site.GetPage "/privacy" }}
          <a href="{{ .RelPermalink }}">{{ i18n "nav_privacy" }}</a>
        {{ end }}
      </div>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="lang-switcher">
      {{ range .AllTranslations }}
        {{ if eq .Lang $.Language.Lang }}
          <span class="lang-current">{{ .Language.Label }}</span>
        {{ else }}
          <a href="{{ .RelPermalink }}">{{ .Language.Label }}</a>
        {{ end }}
      {{ end }}
    </div>
  </footer>
</body>
</html>
